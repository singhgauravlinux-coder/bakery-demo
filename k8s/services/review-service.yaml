apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: bakery
  labels:
    app: review-service
    app.kubernetes.io/part-of: crumb-and-ember
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: review-service
          image: ghcr.io/singhgauravlinux-coder/bakery-demo/review-service:e4e79bf
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVICE_NAME
              value: "review-service"
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: bakery
  labels:
    app: review-service
spec:
  selector:
    app: review-service
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
